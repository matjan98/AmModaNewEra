<!DOCTYPE html>
<html lang="pl">
  <head>
    <title><%= productName %></title>

    <meta charset="utf-8">
    <meta name="theme-color" content="#E61971">

    <!-- Per-route title, description, canonical, og:url, og:title and
         og:description are managed at runtime by @unhead/vue (see
         src/pages/IndexPage.vue). The tags below are global defaults shared by
         every route. Twitter cards fall back to the og:* values. -->
    <meta property="og:type" content="website">
    <meta property="og:locale" content="pl_PL">
    <meta property="og:site_name" content="A&M Moda Damska">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="<%= siteOrigin %>/icons/open-graph-1200x630.jpg">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="viewport" content="width=device-width, initial-scale=1<% if (ctx.mode.cordova || ctx.mode.capacitor) { %>, viewport-fit=cover<% } %>">

    <meta property="og:image" content="<%= siteOrigin %>/icons/open-graph-1200x630.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:alt" content="A&M Moda Damska – salon przy ul. Bielskiej 166, Kozy">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">

    <!-- ClothingStore JSON-LD is injected at runtime by @unhead/vue with the
         live Google rating - see src/composables/useStructuredData.js. -->
  </head>
  <body>
    <!-- quasar:entry-point -->
  </body>
</html>
